{% extends "base.html" %}
{% load static %}

{% block title %}Billing{% endblock %}

{% block content %}
<!-- Page Title -->
<div class="row">
    <div class="col-12">
        <div class="page-title-box d-sm-flex align-items-center justify-content-between">
            <h4 class="mb-sm-0">Billing</h4>
            <div class="page-title-right">
                <ol class="breadcrumb m-0">
                    <li class="breadcrumb-item"><a href="/">NavHCM</a></li>
                    <li class="breadcrumb-item"><a href="javascript: void(0);">Subscriptions</a></li>
                    <li class="breadcrumb-item active">Billing</li>
                </ol>
            </div>
        </div>
    </div>
</div>

<!-- Billing Info -->
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div class="text-center py-5">
                    <div class="avatar-md mx-auto mb-3">
                        <div class="avatar-title bg-light text-secondary rounded-circle fs-1">
                            <i class="ri-information-line"></i>
                        </div>
                    </div>
                    <h5 class="text-muted mb-1">No billing information available yet</h5>
                    <p class="text-muted mb-0">Billing details will appear here once a paid subscription is active.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
